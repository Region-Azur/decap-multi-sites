services:
  proxy:
    image: jc21/nginx-proxy-manager:latest
    ports:
      - "${PROXY_HTTP_PORT:-80}:80"
      - "${PROXY_HTTPS_PORT:-443}:443"
      - "${PROXY_ADMIN_PORT:-81}:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - edge

  oauth2_proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${HITOBITO_OIDC_ISSUER}
      - OAUTH2_PROXY_CLIENT_ID=${HITOBITO_OIDC_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${HITOBITO_OIDC_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_SCOPE=${OAUTH2_PROXY_SCOPE:-openid email name}
      - OAUTH2_PROXY_REDIRECT_URL=${OAUTH2_PROXY_REDIRECT_URL}
      - OAUTH2_PROXY_UPSTREAMS=http://api:4000/api/,http://portal:3000/
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_PASS_USER_HEADERS=true
      - OAUTH2_PROXY_REVERSE_PROXY=${OAUTH2_PROXY_REVERSE_PROXY:-true}
      - OAUTH2_PROXY_PASS_ACCESS_TOKEN=true
      - OAUTH2_PROXY_CODE_CHALLENGE_METHOD=${OAUTH2_PROXY_CODE_CHALLENGE_METHOD:-S256}
      - OAUTH2_PROXY_COOKIE_SECURE=${OAUTH2_PROXY_COOKIE_SECURE:-true}
    restart: unless-stopped
    networks:
      - edge
      - backend

  portal:
    build:
      context: ./services
      dockerfile: portal/Dockerfile
    environment:
      - PORTAL_PORT=3000
      - PORTAL_BASE_URL=${PORTAL_BASE_URL}
      - API_BASE_URL=${API_BASE_URL}
      - PORTAL_TRUSTED_PROXY_CIDRS=${PORTAL_TRUSTED_PROXY_CIDRS}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - HITOBITO_OIDC_ISSUER=${HITOBITO_OIDC_ISSUER}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    networks:
      - backend

  api:
    build:
      context: ./services
      dockerfile: api/Dockerfile
    environment:
      - API_PORT=4000
      - API_BASE_URL=${API_BASE_URL}
      - API_TRUSTED_PROXY_CIDRS=${API_TRUSTED_PROXY_CIDRS}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - HITOBITO_OIDC_ISSUER=${HITOBITO_OIDC_ISSUER}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    networks:
      - backend

  mysql:
    image: mysql:8.4
    profiles: [ "mysql" ]
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped
    networks:
      - db

volumes:
  mysql_data:
  sqlite_data:
  npm_data:
  npm_letsencrypt:


networks:
  edge:
  backend:
    driver: bridge
  db:
    internal: true
