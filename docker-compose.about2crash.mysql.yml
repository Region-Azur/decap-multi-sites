services:
  oauth2_proxy:
    build:
      context: .
      dockerfile: oauth2-proxy-templates/Dockerfile
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=${HITOBITO_OIDC_ISSUER}
      - OAUTH2_PROXY_CLIENT_ID=${HITOBITO_OIDC_CLIENT_ID}
      - OAUTH2_PROXY_CLIENT_SECRET=${HITOBITO_OIDC_CLIENT_SECRET}
      - OAUTH2_PROXY_COOKIE_SECRET=${OAUTH2_PROXY_COOKIE_SECRET}
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_SCOPE=${OAUTH2_PROXY_SCOPE:-openid email name}
      - OAUTH2_PROXY_REDIRECT_URL=${OAUTH2_PROXY_REDIRECT_URL}
      - OAUTH2_PROXY_UPSTREAMS=http://api:4000/api/,http://api:4000/.netlify/git/,http://portal:3000/
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_PASS_USER_HEADERS=true
      - OAUTH2_PROXY_REVERSE_PROXY=${OAUTH2_PROXY_REVERSE_PROXY:-true}
      - OAUTH2_PROXY_PASS_ACCESS_TOKEN=true
      - OAUTH2_PROXY_CODE_CHALLENGE_METHOD=${OAUTH2_PROXY_CODE_CHALLENGE_METHOD:-S256}
      - OAUTH2_PROXY_COOKIE_SECURE=${OAUTH2_PROXY_COOKIE_SECURE:-true}
      - OAUTH2_PROXY_CUSTOM_TEMPLATES_DIR=/templates
      - OAUTH2_PROXY_FOOTER=© Region AZUR
      - OAUTH2_PROXY_SKIP_AUTH_REGEX=^/favicon\.ico$|^/favicon-.*\.png$|^/apple-touch-icon\.png$|^/.*-logo\.svg$|^/example-logo\.svg$|^/midata\.svg$
    restart: unless-stopped
    networks:
      - nginx-proxy-manager_npm-network
      - backend

  portal:
    build:
      context: .
      dockerfile: services/portal/Dockerfile
    environment:
      - PORTAL_PORT=3000
      - PORTAL_BASE_URL=${PORTAL_BASE_URL}
      - API_BASE_URL=${API_BASE_URL}
      - PORTAL_TRUSTED_PROXY_CIDRS=${PORTAL_TRUSTED_PROXY_CIDRS}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - HITOBITO_OIDC_ISSUER=${HITOBITO_OIDC_ISSUER}
      - HITOBITO_USERINFO_URL=${HITOBITO_USERINFO_URL}
      - JWT_SECRET=${JWT_SECRET}
      - DEV=${DEV:-false}
      - NODE_ENV=production
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - backend
      - db

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      - API_PORT=4000
      - API_BASE_URL=${API_BASE_URL}
      - API_TRUSTED_PROXY_CIDRS=${API_TRUSTED_PROXY_CIDRS}
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - HITOBITO_OIDC_ISSUER=${HITOBITO_OIDC_ISSUER}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - DEV=${DEV:-false}
      - NODE_ENV=production
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - backend
      - db

  mysql:
    image: mariadb:10.11
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MYSQL_DATABASE}
      - MARIADB_USER=${MYSQL_USER}
      - MARIADB_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    restart: unless-stopped
    networks:
      - db

volumes:
  mysql_data:

networks:
  nginx-proxy-manager_npm-network:
    external: true
  backend:
    driver: bridge
  db:
    driver: bridge

